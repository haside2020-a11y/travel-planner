<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행 일정</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
</head>
<body>

<!-- 오프라인 상태 바 -->
<div id="status-bar" style="display:none;padding:8px 20px;font-size:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:#1a1a18;border-bottom:1px solid rgba(255,255,255,.1)">
  <div style="display:flex;align-items:center;gap:8px">
    <span id="status-dot" style="width:8px;height:8px;border-radius:50%;background:#1d9e75;display:inline-block"></span>
    <span id="status-text" style="color:rgba(255,255,255,.7)">온라인</span>
    <span id="last-saved" style="color:rgba(255,255,255,.35)"></span>
  </div>
  <div style="display:flex;gap:8px">
    <button onclick="saveOffline()" style="padding:4px 12px;font-size:11px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);cursor:pointer;font-family:inherit">💾 저장</button>
    <button onclick="syncOnline()" id="sync-btn" style="padding:4px 12px;font-size:11px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);cursor:pointer;font-family:inherit">🔄 동기화</button>
  </div>
</div>

<!-- 헤더 -->
<div class="trip-header">
  <div style="font-size:11px;color:rgba(255,255,255,.35);margin-bottom:6px">
    <a href="index.html" style="color:rgba(255,255,255,.35)">← 목록으로</a>
  </div>
  <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap">
    <h1 id="hdr-title" style="font-size:18px;font-weight:600">불러오는 중...</h1>
    <div id="hdr-stats"></div>
  </div>
  <div class="sub" id="hdr-sub" style="margin-top:2px"></div>
</div>

<!-- 탭 -->
<div class="tab-bar" id="tab-bar"></div>

<!-- 콘텐츠 -->
<div class="content" id="content">
  <div class="loading">여행 정보를 불러오는 중...</div>
</div>

<!-- 잠금 버튼 -->
<button class="lock-btn" id="lock-btn" title="편집 모드">🔒</button>

<!-- PIN 모달 -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>편집 모드</h3>
    <p>PIN 번호를 입력하세요</p>
    <input type="password" class="pin-input" id="pin-input" maxlength="4" placeholder="••••">
    <div class="pin-error" id="pin-error">PIN이 틀렸습니다</div>
    <div class="modal-actions">
      <button class="btn" id="pin-cancel">취소</button>
      <button class="btn btn-primary" id="pin-confirm">확인</button>
    </div>
  </div>
</div>

<!-- 활동 추가/편집 모달 -->
<div class="modal-bg" id="act-modal">
  <div class="modal" style="width:400px;text-align:left">
    <h3 id="act-modal-title" style="margin-bottom:16px">활동 추가</h3>
    <input type="hidden" id="act-id">
    <input type="hidden" id="act-day-id">
    <div style="display:flex;flex-direction:column;gap:10px">
      <div>
        <label style="font-size:11px;color:#888;display:block;margin-bottom:6px">시간</label>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <select id="act-sh" style="width:64px;padding:7px 6px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:13px;outline:none;background:#fff">
            <option value="">시</option>
          </select>
          <span style="color:#ccc">:</span>
          <select id="act-sm" style="width:64px;padding:7px 6px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:13px;outline:none;background:#fff">
            <option value="">분</option>
          </select>
          <span style="color:#bbb;font-size:12px;margin:0 2px">~</span>
          <select id="act-eh" style="width:64px;padding:7px 6px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:13px;outline:none;background:#fff">
            <option value="">시</option>
          </select>
          <span style="color:#ccc">:</span>
          <select id="act-em" style="width:64px;padding:7px 6px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:13px;outline:none;background:#fff">
            <option value="">분</option>
          </select>
          <span style="font-size:10px;color:#ccc">(종료 선택)</span>
        </div>
      </div>
      <div>
          <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">종류</label>
          <select id="act-type" style="width:100%;padding:7px 9px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:13px;outline:none;background:#fff">
            <option value="sight">🏛️ 관광</option>
            <option value="meal">🍽️ 식사</option>
            <option value="activity">🎯 액티비티</option>
            <option value="shopping">🛍️ 쇼핑</option>
            <option value="transport">✈️ 이동</option>
            <option value="hotel">🏨 숙박</option>
            <option value="free">🌙 자유</option>
            <option value="etc">📌 기타</option>
          </select>
      </div>
      <div>
        <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">이름 *</label>
        <input type="text" id="act-name" placeholder="언더워터 월드" style="width:100%;padding:7px 9px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:13px;outline:none">
      </div>
      <div>
        <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">설명</label>
        <textarea id="act-desc" rows="2" placeholder="간단한 설명..." style="width:100%;padding:7px 9px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:13px;outline:none;resize:vertical"></textarea>
      </div>
      <div>
        <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">메모 (팁)</label>
        <input type="text" id="act-memo" placeholder="예약 필수, 주의사항 등" style="width:100%;padding:7px 9px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:13px;outline:none">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 80px;gap:8px">
        <div>
          <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">1인 비용</label>
          <input type="text" id="act-cost-pp" placeholder="25000" style="width:100%;padding:7px 9px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:13px;outline:none">
        </div>
        <div>
          <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">총 비용</label>
          <input type="text" id="act-cost-total" placeholder="100000" style="width:100%;padding:7px 9px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:13px;outline:none">
        </div>
        <div>
          <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">통화</label>
          <select id="act-currency" style="width:100%;padding:7px 9px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:13px;outline:none;background:#fff">
            <option value="KRW">KRW</option>
            <option value="USD">USD</option>
            <option value="JPY">JPY</option>
            <option value="EUR">EUR</option>
          </select>
        </div>
      </div>
      <div>
        <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">지도 링크</label>
        <input type="url" id="act-map" placeholder="https://naver.me/..." style="width:100%;padding:7px 9px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:13px;outline:none">
      </div>
      <div>
        <label style="font-size:11px;color:#888;display:block;margin-bottom:3px">블로그/참고 링크</label>
        <input type="url" id="act-blog" placeholder="https://blog.naver.com/..." style="width:100%;padding:7px 9px;border:1.5px solid #e0e0e0;border-radius:7px;font-family:inherit;font-size:13px;outline:none">
      </div>
    </div>
    <div style="margin-top:18px" class="modal-actions">
      <button class="btn" id="act-cancel">취소</button>
      <button class="btn btn-primary" id="act-save">저장</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

const TYPE_ICONS = { transport:'✈️', meal:'🍽️', sight:'🏛️', shopping:'🛍️', hotel:'🏨', activity:'🎯', free:'🌙', etc:'📌' }
const TYPE_LABELS = { transport:'이동', meal:'식사', sight:'관광', shopping:'쇼핑', hotel:'숙박', activity:'액티비티', free:'자유', etc:'기타' }

let tripData = null
let daysData = []
let activitiesData = {}
let editMode = false
let activeTab = 'all'
let editingActId = null

const params = new URLSearchParams(location.search)
const slug = params.get('slug')

if (!slug) { location.href = 'index.html' }

async function init(forceNetwork = false) {
  updateStatusBar()

  // 오프라인이거나 강제 네트워크가 아닐 때 로컬 데이터 먼저 시도
  if (!navigator.onLine && !forceNetwork) {
    if (loadOfflineData()) {
      renderHeader(); renderTabs(); renderAll()
      showToast('📦 저장된 데이터로 열었습니다')
      return
    }
    document.getElementById('content').innerHTML = '<div class="error-msg">오프라인 상태입니다.<br>먼저 온라인에서 💾 저장을 눌러주세요.</div>'
    return
  }

  try {
    const { data: trip, error } = await sb.from('trips').select('*').eq('slug', slug).single()
    if (error || !trip) throw new Error('not found')
    tripData = trip

    const { data: days } = await sb.from('days').select('*').eq('trip_id', trip.id).order('day_number')
    daysData = days || []

    for (const day of daysData) {
      const { data: acts } = await sb.from('activities').select('*').eq('day_id', day.id).order('sort_order').order('time')
      activitiesData[day.id] = acts || []
    }
  } catch {
    // 네트워크 실패 시 로컬 폴백
    if (loadOfflineData()) {
      renderHeader(); renderTabs(); renderAll()
      showToast('📦 저장된 데이터로 열었습니다 (네트워크 오류)')
      updateStatusBar()
      return
    }
    document.getElementById('content').innerHTML = '<div class="error-msg">여행을 불러올 수 없습니다.<br>인터넷 연결을 확인하거나 저장된 데이터가 필요합니다.</div>'
    return
  }

  renderHeader()
  renderTabs()
  renderAll()
  updateStatusBar()
}

function renderHeader() {
  document.title = tripData.title
  const nights = tripData.start_date && tripData.end_date
    ? Math.round((new Date(tripData.end_date) - new Date(tripData.start_date)) / 86400000) : null
  const metas = [
    nights ? `${nights}박 ${nights+1}일` : null,
    tripData.people_count ? `${tripData.people_count}명` : null,
    tripData.airline || null,
    tripData.hotel || null
  ].filter(Boolean).join(' · ')

  document.getElementById('hdr-title').textContent = tripData.title
  document.getElementById('hdr-sub').textContent = `${tripData.destination || ''} · ${fmtDate(tripData.start_date)} ~ ${fmtDate(tripData.end_date)}`
  document.getElementById('hdr-stats').innerHTML = metas
    ? `<span style="font-size:11px;color:rgba(255,255,255,.4)">${metas}</span>` : ''
}

function renderTabs() {
  const bar = document.getElementById('tab-bar')
  bar.innerHTML = ''
  const allBtn = mkTab('all', '전체', '개요')
  bar.appendChild(allBtn)
  daysData.forEach(day => {
    const d = getDayDate(day)
    const main = d ? `${d.getMonth()+1}/${d.getDate()}` : `Day ${day.day_number}`
    const sub  = d ? `(Day ${day.day_number}) <span style="color:#aaa">${getKorDow(d)}</span>` : ''
    bar.appendChild(mkTab(day.id, main, sub))
  })
  if (editMode) {
    const addBtn = document.createElement('button')
    addBtn.className = 'tab-btn'
    addBtn.innerHTML = '<span class="dn">＋</span><span class="dd">날짜추가</span>'
    addBtn.onclick = addDay
    bar.appendChild(addBtn)
  }
}

function mkTab(id, label, sub) {
  const btn = document.createElement('button')
  btn.className = 'tab-btn' + (activeTab === id ? ' active' : '')
  btn.innerHTML = `<span class="dn">${label}</span><span class="dd">${sub}</span>`
  btn.onclick = () => switchTab(id)
  btn.dataset.tab = id

  btn.addEventListener('dragover', e => {
    if (!btn.classList.contains('drop-zone')) return
    e.preventDefault()
    btn.classList.add('drag-over')
  })
  btn.addEventListener('dragleave', () => btn.classList.remove('drag-over'))
  btn.addEventListener('drop', async e => {
    e.preventDefault()
    btn.classList.remove('drag-over')
    const actId = e.dataTransfer.getData('actId')
    const fromDayId = e.dataTransfer.getData('fromDayId')
    const toDayId = id
    if (!actId || toDayId === 'all' || toDayId === fromDayId) return
    await sb.from('activities').update({ day_id: toDayId }).eq('id', actId)
    await reloadActivities(fromDayId)
    await reloadActivities(toDayId)
    activeTab = toDayId
    renderTabs()
    renderAll()
    showToast('✅ 이동 완료!')
  })

  return btn
}

function switchTab(id) {
  activeTab = id
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id))
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.dataset.view === id))
}

function renderAll() {
  const content = document.getElementById('content')
  content.innerHTML = ''

  // 개요
  const ovView = document.createElement('div')
  ovView.className = 'view' + (activeTab === 'all' ? ' active' : '')
  ovView.dataset.view = 'all'
  ovView.appendChild(renderOverview())
  content.appendChild(ovView)

  // 일별
  daysData.forEach(day => {
    const view = document.createElement('div')
    view.className = 'view' + (activeTab === day.id ? ' active' : '')
    view.dataset.view = day.id
    view.appendChild(renderDay(day))
    content.appendChild(view)
  })

  if (editMode) content.classList.add('edit-mode')
  else content.classList.remove('edit-mode')
}

function renderOverview() {
  const wrap = document.createElement('div')
  if (!daysData.length) {
    wrap.innerHTML = '<div class="loading">일정을 추가하면 전체 개요가 표시됩니다.</div>'
    return wrap
  }

  // 활동을 시작 시간(시) 기준으로 매핑
  const actsByHour = {}   // { dayId: { hour: [acts] } }
  let minHour = 6, maxHour = 22

  daysData.forEach(day => {
    actsByHour[day.id] = {}
    ;(activitiesData[day.id] || []).forEach(act => {
      const m = (act.time || '').match(/^(\d{1,2}):/)
      const h = m ? parseInt(m[1]) : null
      if (h === null) return
      minHour = Math.min(minHour, h)
      maxHour = Math.max(maxHour, h)
      if (!actsByHour[day.id][h]) actsByHour[day.id][h] = []
      actsByHour[day.id][h].push(act)
    })
  })

  const outer = document.createElement('div')
  outer.style.cssText = 'overflow-x:auto;border:1px solid #e8e6e0;border-radius:12px;'

  const table = document.createElement('table')
  table.style.cssText = 'width:100%;border-collapse:collapse;table-layout:fixed;'

  // 헤더행
  const thead = document.createElement('thead')
  const hrow = document.createElement('tr')
  const th0 = document.createElement('th')
  th0.style.cssText = 'width:60px;padding:10px 8px;font-size:11px;color:#bbb;font-weight:400;border-bottom:2px solid #e8e6e0;background:#faf9f6;position:sticky;left:0;z-index:2;text-align:center;'
  th0.textContent = '시간'
  hrow.appendChild(th0)

  daysData.forEach(day => {
    const d = getDayDate(day)
    const th = document.createElement('th')
    th.style.cssText = 'padding:10px 14px;text-align:left;border-bottom:2px solid #e8e6e0;border-left:1px solid #e8e6e0;background:#faf9f6;min-width:160px;cursor:pointer;'
    th.innerHTML = d
      ? `<div style="font-size:13px;font-weight:700">${d.getMonth()+1}월 ${d.getDate()}일</div>
         <div style="font-size:10px;color:#aaa;margin-top:2px">${day.title && day.title !== 'Day '+day.day_number ? day.title : 'Day '+day.day_number}</div>`
      : `<div style="font-size:13px;font-weight:700">Day ${day.day_number}</div>`
    th.onclick = () => switchTab(day.id)
    hrow.appendChild(th)
  })
  thead.appendChild(hrow)
  table.appendChild(thead)

  // 시간대별 행
  const tbody = document.createElement('tbody')
  for (let h = minHour; h <= maxHour; h++) {
    const tr = document.createElement('tr')
    const isHalfHour = false
    const hasAny = daysData.some(day => (actsByHour[day.id][h] || []).length > 0)
    const rowBg = hasAny ? '#fff' : '#fafaf9'
    const borderStyle = h % 3 === 0 ? '1px solid #ece9e4' : '1px solid #f5f3f0'

    // 시간 셀
    const tdTime = document.createElement('td')
    tdTime.style.cssText = `padding:6px 8px;font-size:12px;font-weight:${hasAny?'600':'400'};color:${hasAny?'#555':'#ccc'};text-align:right;border-bottom:${borderStyle};position:sticky;left:0;background:${rowBg};z-index:1;white-space:nowrap;vertical-align:top;padding-top:10px;`
    tdTime.textContent = `${String(h).padStart(2,'0')}:00`
    tr.appendChild(tdTime)

    daysData.forEach(day => {
      const td = document.createElement('td')
      td.style.cssText = `padding:${hasAny?'8px':'4px'} 12px;border-bottom:${borderStyle};border-left:1px solid #ece9e4;vertical-align:top;background:${rowBg};min-height:${hasAny?'auto':'28px'};`
      const acts = actsByHour[day.id][h] || []
      acts.forEach(act => {
        const chip = document.createElement('div')
        chip.style.cssText = 'display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;cursor:pointer;'
        chip.innerHTML = `
          <span class="ov-dot type-${act.type}" style="width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;outline:1px solid rgba(0,0,0,.08)"></span>
          <span style="font-size:12px;color:#222;line-height:1.45;">
            ${act.time ? `<span style="font-size:10px;color:#aaa;margin-right:3px">${act.time}</span>` : ''}
            ${act.name}
          </span>`
        chip.onclick = () => switchTab(day.id)
        td.appendChild(chip)
      })
      tr.appendChild(td)
    })
    tbody.appendChild(tr)
  }
  table.appendChild(tbody)
  outer.appendChild(table)
  wrap.appendChild(outer)
  return wrap
}

function renderDay(day) {
  const acts = activitiesData[day.id] || []
  const wrap = document.createElement('div')

  // 툴바
  const toolbar = document.createElement('div')
  toolbar.style.cssText = 'display:flex;gap:8px;margin-bottom:14px;align-items:center'
  toolbar.innerHTML = `<button class="btn" onclick="printDay('${day.id}')">🖨️ 인쇄</button>`
  if (editMode) {
    const editDayBtn = document.createElement('button')
    editDayBtn.className = 'btn'
    editDayBtn.textContent = '✏️ 날짜 정보 수정'
    editDayBtn.onclick = () => editDayInfo(day)
    toolbar.appendChild(editDayBtn)
  }
  wrap.appendChild(toolbar)

  // 헤더
  const head = document.createElement('div')
  head.className = 'day-head'
  const dd = getDayDate(day)
  const dateStr = dd ? `${dd.getMonth()+1}월 ${dd.getDate()}일` : `Day ${day.day_number}`
  const dow = dd ? ` <span style="font-size:13px;font-weight:400;color:#aaa">${getKorDow(dd)}</span>` : ''
  const dayNumStr = dd ? ` <span style="font-size:14px;font-weight:400;color:#bbb">(Day ${day.day_number})</span>` : ''
  const defaultTitle = `Day ${day.day_number}`
  const customTitle = day.title && day.title !== defaultTitle ? day.title : ''
  head.innerHTML = `
    <div class="day-head-title">${dateStr}${dow}${dayNumStr}</div>
    ${customTitle ? `<div class="day-head-memo" style="margin-top:2px">${customTitle}</div>` : ''}`
  wrap.appendChild(head)

  // 레이아웃
  const layout = document.createElement('div')
  layout.className = 'day-layout'

  // 타임라인
  const tlWrap = document.createElement('div')
  const tl = document.createElement('div')
  tl.className = 'timeline'
  acts.forEach(act => tl.appendChild(renderActivity(act, day.id)))

  if (editMode) {
    const addBtn = document.createElement('button')
    addBtn.className = 'add-activity-btn'
    addBtn.textContent = '＋ 활동 추가'
    addBtn.onclick = () => openActModal(null, day.id)
    tl.appendChild(addBtn)
  }
  tlWrap.appendChild(tl)
  layout.appendChild(tlWrap)

  // 비용 패널
  layout.appendChild(renderCostPanel(acts))

  wrap.appendChild(layout)

  // 하단 메모
  wrap.appendChild(renderDayNotes(day))

  return wrap
}

function renderDayNotes(day) {
  const section = document.createElement('div')
  section.style.cssText = 'margin-top:20px;padding-top:16px;border-top:1px solid #e8e6e0;'

  if (day.memo) {
    const box = document.createElement('div')
    box.style.cssText = 'background:#faf9f6;border:1px solid #e8e6e0;border-radius:10px;padding:14px 16px;'
    box.innerHTML = `<div style="font-size:11px;color:#bbb;margin-bottom:6px;font-weight:500">메모</div>`

    const text = document.createElement('div')
    text.style.cssText = 'font-size:13px;color:#555;line-height:1.7;white-space:pre-wrap;outline:none;'
    text.textContent = day.memo

    if (editMode) {
      text.contentEditable = 'true'
      text.style.cursor = 'text'
      text.addEventListener('blur', async () => {
        const val = text.innerText.trim()
        await sb.from('days').update({ memo: val || null }).eq('id', day.id)
        const idx = daysData.findIndex(d => d.id === day.id)
        if (idx !== -1) daysData[idx].memo = val || null
        if (!val) renderAll()
      })

      const delBtn = document.createElement('button')
      delBtn.textContent = '메모 삭제'
      delBtn.style.cssText = 'margin-top:8px;font-size:11px;color:#bbb;background:none;border:none;cursor:pointer;padding:0;font-family:inherit;'
      delBtn.onclick = async () => {
        if (!confirm('메모를 삭제할까요?')) return
        await sb.from('days').update({ memo: null }).eq('id', day.id)
        const idx = daysData.findIndex(d => d.id === day.id)
        if (idx !== -1) daysData[idx].memo = null
        renderAll()
      }
      box.appendChild(text)
      box.appendChild(delBtn)
    } else {
      box.appendChild(text)
    }

    section.appendChild(box)

  } else if (editMode) {
    const addBtn = document.createElement('button')
    addBtn.style.cssText = 'width:100%;padding:10px;border:1.5px dashed #ddd;border-radius:10px;background:none;color:#bbb;font-size:13px;cursor:pointer;font-family:inherit;transition:.2s;'
    addBtn.textContent = '＋ 메모 추가'
    addBtn.onmouseover = () => { addBtn.style.borderColor='#aaa'; addBtn.style.color='#888' }
    addBtn.onmouseout = () => { addBtn.style.borderColor='#ddd'; addBtn.style.color='#bbb' }
    addBtn.onclick = async () => {
      await sb.from('days').update({ memo: ' ' }).eq('id', day.id)
      const idx = daysData.findIndex(d => d.id === day.id)
      if (idx !== -1) daysData[idx].memo = ' '
      renderAll()
      setTimeout(() => {
        const activeView = document.querySelector('.view.active')
        const noteText = activeView?.querySelector('[contenteditable]')
        if (noteText) { noteText.focus(); noteText.textContent = ''; }
      }, 50)
    }
    section.appendChild(addBtn)
  }

  return section
}

function renderActivity(act, dayId) {
  const el = document.createElement('div')
  el.className = 'tl-item'
  el.dataset.id = act.id

  const icon = TYPE_ICONS[act.type] || '📍'
  const typeLabel = TYPE_LABELS[act.type] || ''

  const timeParts = (act.time || '').split('~')
  const timeMain = timeParts[0]?.trim() || ''
  const timeEnd  = timeParts[1]?.trim() || ''

  let links = ''
  if (act.map_url) links += `<a class="tl-link" href="${act.map_url}" target="_blank">📍 지도</a>`
  if (act.blog_url) links += `<a class="tl-link" href="${act.blog_url}" target="_blank">📝 블로그</a>`

  const costStr = act.cost_per_person
    ? `<span style="font-size:11px;color:#aaa;margin-left:auto">${fmtCost(act.cost_per_person, act.currency)}</span>` : ''

  el.innerHTML = `
    <div class="tl-time-col">
      ${timeMain}
      ${timeEnd ? `<small>~${timeEnd}</small>` : ''}
    </div>
    <div class="tl-icon-col">
      <div class="tl-icon type-${act.type}">${icon}</div>
    </div>
    <div class="tl-card" ${editMode ? 'draggable="true"' : ''}>
      <div class="tl-row1">
        <span class="tl-type-badge">${typeLabel}</span>
        ${costStr}
        ${editMode ? `<span style="margin-left:auto;display:flex;gap:4px">
          <button class="tl-action-btn" onclick="openActModal('${act.id}','${dayId}')">수정</button>
          <button class="tl-action-btn del" onclick="deleteActivity('${act.id}','${dayId}')">삭제</button>
        </span>` : ''}
      </div>
      <div class="tl-name">${act.name || ''}</div>
      ${act.description ? `<div class="tl-desc">${act.description}</div>` : ''}
      ${links ? `<div class="tl-links">${links}</div>` : ''}
      ${act.memo ? `<div class="tl-memo">💡 ${act.memo}</div>` : ''}
    </div>
  `

  if (editMode) {
    const card = el.querySelector('.tl-card')
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('actId', act.id)
      e.dataTransfer.setData('fromDayId', dayId)
      el.classList.add('dragging')
      document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
        if (btn.dataset.tab !== 'all' && btn.dataset.tab !== dayId)
          btn.classList.add('drop-zone')
      })
    })
    card.addEventListener('dragend', () => {
      el.classList.remove('dragging')
      document.querySelectorAll('.tab-btn').forEach(b =>
        b.classList.remove('drop-zone', 'drag-over'))
    })
  }

  return el
}

function renderCostPanel(acts) {
  const panel = document.createElement('div')
  panel.className = 'cost-panel'

  const withCost = acts.filter(a => a.cost_per_person || a.cost_total)
  if (!withCost.length) {
    panel.innerHTML = '<h4>비용</h4><div style="font-size:12px;color:#ccc;text-align:center;padding:20px 0">비용 없음</div>'
    return panel
  }

  const totals = {}
  withCost.forEach(a => {
    const cur = a.currency || 'KRW'
    if (!totals[cur]) totals[cur] = { pp: 0, total: 0 }
    totals[cur].pp += parseFloat(a.cost_per_person) || 0
    totals[cur].total += parseFloat(a.cost_total) || 0
  })

  const items = withCost.map(a => `
    <div class="cost-item">
      <div class="cost-name">${a.name}</div>
      <div class="cost-vals">
        ${a.cost_per_person ? `<div class="cost-pp">1인 ${fmtCost(a.cost_per_person, a.currency)}</div>` : ''}
        ${a.cost_total ? `<div class="cost-total">총 ${fmtCost(a.cost_total, a.currency)}</div>` : ''}
      </div>
    </div>`).join('')

  const sums = Object.entries(totals).map(([cur, v]) => `
    <div class="cost-sum-row">
      <span class="cost-sum-label">1인 합계 (${cur})</span>
      <span class="cost-sum-val">${fmtCost(v.pp, cur)}</span>
    </div>
    <div class="cost-sum-row">
      <span class="cost-sum-label">총 합계 (${cur})</span>
      <span class="cost-sum-val">${fmtCost(v.total, cur)}</span>
    </div>`).join('')

  panel.innerHTML = `<h4>비용</h4>${items}<hr class="cost-divider"><div class="cost-sum">${sums}</div>`
  return panel
}

// ── 활동 모달 ──
document.getElementById('act-cancel').onclick = () => document.getElementById('act-modal').classList.remove('show')
document.getElementById('act-save').onclick = saveActivity

function openActModal(actId, dayId) {
  editingActId = actId
  document.getElementById('act-day-id').value = dayId
  document.getElementById('act-modal-title').textContent = actId ? '활동 수정' : '활동 추가'

  if (actId) {
    const acts = Object.values(activitiesData).flat()
    const act = acts.find(a => a.id === actId)
    if (act) {
      document.getElementById('act-id').value = act.id
      setTimeVal(act.time || '')
      document.getElementById('act-type').value = act.type || 'sight'
      document.getElementById('act-name').value = act.name || ''
      document.getElementById('act-desc').value = act.description || ''
      document.getElementById('act-memo').value = act.memo || ''
      document.getElementById('act-cost-pp').value = act.cost_per_person || ''
      document.getElementById('act-cost-total').value = act.cost_total || ''
      document.getElementById('act-currency').value = act.currency || 'KRW'
      document.getElementById('act-map').value = act.map_url || ''
      document.getElementById('act-blog').value = act.blog_url || ''
    }
  } else {
    document.getElementById('act-id').value = ''
    setTimeVal('')
    document.getElementById('act-type').value = 'sight'
    document.getElementById('act-name').value = ''
    document.getElementById('act-desc').value = ''
    document.getElementById('act-memo').value = ''
    document.getElementById('act-cost-pp').value = ''
    document.getElementById('act-cost-total').value = ''
    document.getElementById('act-currency').value = 'KRW'
    document.getElementById('act-map').value = ''
    document.getElementById('act-blog').value = ''
  }
  document.getElementById('act-modal').classList.add('show')
  document.getElementById('act-name').focus()
}

async function saveActivity() {
  const dayId = document.getElementById('act-day-id').value
  const actId = document.getElementById('act-id').value
  const payload = {
    day_id: dayId,
    time: getTimeVal(),
    type: document.getElementById('act-type').value,
    name: document.getElementById('act-name').value,
    description: document.getElementById('act-desc').value,
    memo: document.getElementById('act-memo').value,
    cost_per_person: parseFloat(document.getElementById('act-cost-pp').value) || null,
    cost_total: parseFloat(document.getElementById('act-cost-total').value) || null,
    currency: document.getElementById('act-currency').value,
    map_url: document.getElementById('act-map').value || null,
    blog_url: document.getElementById('act-blog').value || null,
  }
  if (!payload.name) return

  if (actId) {
    await sb.from('activities').update(payload).eq('id', actId)
  } else {
    await sb.from('activities').insert(payload)
  }
  document.getElementById('act-modal').classList.remove('show')
  await reloadActivities(dayId)
  renderAll()
}

async function deleteActivity(actId, dayId) {
  if (!confirm('이 활동을 삭제할까요?')) return
  await sb.from('activities').delete().eq('id', actId)
  await reloadActivities(dayId)
  renderAll()
}

async function reloadActivities(dayId) {
  const { data } = await sb.from('activities').select('*').eq('day_id', dayId).order('sort_order').order('time')
  activitiesData[dayId] = data || []
}

// ── 날짜(Day) 추가 ──
async function addDay() {
  const nextNum = daysData.length + 1
  const { data } = await sb.from('days').insert({
    trip_id: tripData.id,
    day_number: nextNum,
    title: `Day ${nextNum}`,
    date: null, memo: ''
  }).select().single()
  if (data) {
    daysData.push(data)
    activitiesData[data.id] = []
    activeTab = data.id
    renderTabs()
    renderAll()
  }
}

// ── 날짜 정보 수정 (간단 prompt 방식) ──
async function editDayInfo(day) {
  const title = prompt('날짜 제목:', day.title || '')
  if (title === null) return
  const date = prompt('날짜 (YYYY-MM-DD):', day.date || '')
  const memo = prompt('메모:', day.memo || '')
  await sb.from('days').update({ title, date: date || null, memo }).eq('id', day.id)
  const idx = daysData.findIndex(d => d.id === day.id)
  if (idx !== -1) daysData[idx] = { ...daysData[idx], title, date, memo }
  renderTabs()
  renderAll()
}

// ── 인쇄 ──
function printDay(dayId) {
  document.querySelectorAll('.view').forEach(v => {
    v.classList.remove('print-target')
    if (v.dataset.view === dayId) v.classList.add('print-target')
  })
  window.print()
}

// ── PIN ──
document.getElementById('lock-btn').onclick = () => {
  if (editMode) { exitEdit(); return }
  document.getElementById('modal-bg').classList.add('show')
  setTimeout(() => document.getElementById('pin-input').focus(), 100)
}
document.getElementById('pin-cancel').onclick = () => document.getElementById('modal-bg').classList.remove('show')
document.getElementById('pin-confirm').onclick = checkPin
document.getElementById('pin-input').onkeydown = e => { if (e.key === 'Enter') checkPin() }

async function checkPin() {
  const val = document.getElementById('pin-input').value
  const { data } = await sb.from('config').select('value').eq('key', 'edit_pin').single()
  if (data && data.value === val) {
    editMode = true
    document.getElementById('modal-bg').classList.remove('show')
    document.getElementById('lock-btn').textContent = '✏️'
    document.getElementById('lock-btn').classList.add('unlocked')
    document.getElementById('pin-input').value = ''
    document.getElementById('pin-error').style.display = 'none'
    renderTabs()
    renderAll()
  } else {
    document.getElementById('pin-error').style.display = 'block'
  }
}

function exitEdit() {
  editMode = false
  document.getElementById('lock-btn').textContent = '🔒'
  document.getElementById('lock-btn').classList.remove('unlocked')
  renderTabs()
  renderAll()
}

// ── 유틸 ──
function fmtDate(d) {
  if (!d) return ''
  const dt = new Date(d)
  return `${dt.getMonth()+1}월 ${dt.getDate()}일`
}
const DOW_KO = ['일','월','화','수','목','금','토']
function getKorDow(d) {
  return d ? DOW_KO[d.getDay()] + '요일' : ''
}

function getDayDate(day) {
  if (day.date) return new Date(day.date)
  if (tripData.start_date) {
    const d = new Date(tripData.start_date)
    d.setDate(d.getDate() + day.day_number - 1)
    return d
  }
  return null
}
function getDayDateStr(day) {
  const d = getDayDate(day)
  return d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` : null
}

function mmdd(d) {
  if (!d) return ''
  const dt = new Date(d)
  return `${dt.getMonth()+1}/${dt.getDate()}`
}
function fmtCost(n, cur) {
  if (!n) return ''
  const num = parseFloat(n)
  if (cur === 'KRW') return num.toLocaleString() + '원'
  if (cur === 'JPY') return '¥' + num.toLocaleString()
  if (cur === 'USD') return '$' + num.toFixed(0)
  if (cur === 'EUR') return '€' + num.toFixed(0)
  return num.toLocaleString()
}

// 자동 잠금 30분
let lockTimer = null
document.addEventListener('click', () => {
  if (!editMode) return
  clearTimeout(lockTimer)
  lockTimer = setTimeout(exitEdit, 30 * 60 * 1000)
})

// ── 오프라인 / 동기화 ──
const STORE_KEY = () => `trip-offline-${slug}`

function updateStatusBar() {
  const bar = document.getElementById('status-bar')
  const dot = document.getElementById('status-dot')
  const txt = document.getElementById('status-text')
  const syncBtn = document.getElementById('sync-btn')
  const saved = document.getElementById('last-saved')
  bar.style.display = 'flex'

  const online = navigator.onLine
  dot.style.background = online ? '#1d9e75' : '#e24b4a'
  txt.textContent = online ? '온라인' : '오프라인'
  syncBtn.style.opacity = online ? '1' : '0.4'
  syncBtn.style.pointerEvents = online ? 'auto' : 'none'

  const raw = localStorage.getItem(STORE_KEY() + '-time')
  if (raw) {
    const diff = Math.round((Date.now() - parseInt(raw)) / 60000)
    saved.textContent = diff < 1 ? '· 방금 저장됨' : diff < 60 ? `· ${diff}분 전 저장` : `· ${Math.floor(diff/60)}시간 전 저장`
  } else {
    saved.textContent = '· 저장 안 됨'
  }
}

function saveOffline() {
  const payload = { trip: tripData, days: daysData, activities: activitiesData }
  localStorage.setItem(STORE_KEY(), JSON.stringify(payload))
  localStorage.setItem(STORE_KEY() + '-time', Date.now().toString())
  updateStatusBar()
  showToast('💾 오프라인 저장 완료!')
}

async function syncOnline() {
  if (!navigator.onLine) { showToast('인터넷 연결이 필요합니다'); return }
  showToast('🔄 동기화 중...')
  await init(true)
  saveOffline()
  showToast('✅ 동기화 완료!')
}

function loadOfflineData() {
  const raw = localStorage.getItem(STORE_KEY())
  if (!raw) return false
  try {
    const { trip, days, activities } = JSON.parse(raw)
    tripData = trip; daysData = days; activitiesData = activities
    return true
  } catch { return false }
}

function showToast(msg) {
  const t = document.createElement('div')
  t.textContent = msg
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;white-space:nowrap;pointer-events:none'
  document.body.appendChild(t)
  setTimeout(() => t.remove(), 2500)
}

window.addEventListener('online', updateStatusBar)
window.addEventListener('offline', updateStatusBar)

// ── 시간/분 드롭다운 옵션 생성 ──
function buildTimePickers() {
  ;['act-sh','act-eh'].forEach(id => {
    const sel = document.getElementById(id)
    if (!sel) return
    for (let h = 0; h <= 23; h++) {
      const opt = document.createElement('option')
      opt.value = String(h).padStart(2,'0')
      opt.textContent = String(h).padStart(2,'0') + '시'
      sel.appendChild(opt)
    }
  })
  ;['act-sm','act-em'].forEach(id => {
    const sel = document.getElementById(id)
    if (!sel) return
    for (let m = 0; m <= 59; m++) {
      const opt = document.createElement('option')
      opt.value = String(m).padStart(2,'0')
      opt.textContent = String(m).padStart(2,'0') + '분'
      sel.appendChild(opt)
    }
  })
}

function getTimeVal() {
  const sh = document.getElementById('act-sh').value
  const sm = document.getElementById('act-sm').value
  const eh = document.getElementById('act-eh').value
  const em = document.getElementById('act-em').value
  if (!sh) return ''
  const start = `${sh}:${sm || '00'}`
  const end = eh ? `${eh}:${em || '00'}` : ''
  return end ? `${start}~${end}` : start
}

function setTimeVal(timeStr) {
  const parts = (timeStr || '').split('~')
  const [sh, sm] = (parts[0] || '').split(':')
  const [eh, em] = (parts[1] || '').split(':')
  document.getElementById('act-sh').value = sh || ''
  document.getElementById('act-sm').value = sm || ''
  document.getElementById('act-eh').value = eh || ''
  document.getElementById('act-em').value = em || ''
}

// 서비스 워커 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/travel-planner/sw.js')
}

buildTimePickers()
init()
</script>
